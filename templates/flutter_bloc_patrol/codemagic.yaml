definitions:
  env_versions: &env_versions
    flutter: "3.22.0"
    xcode: latest
    cocoapods: default

  cache: &cache
    cache_paths:
      - $HOME/.gradle/caches
      - $FLUTTER_ROOT/.pub-cache
      - $HOME/Library/Caches/CocoaPods

workflows:
  # Development workflow - runs on every push
  development:
    name: Development Build
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      <<: *env_versions
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'feature/*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
      
      - name: Generate coverage report
        script: |
          genhtml coverage/lcov.info -o coverage/html
    
    artifacts:
      - coverage/html/**
    
    publishing:
      slack:
        channel: '#builds'
        notify_on_build_start: false
        notify:
          success: true
          failure: true

  # Android workflow
  android-workflow:
    name: Android Build & Test
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      <<: *env_versions
      groups:
        - android_signing
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
      
      - name: Build Android APK
        script: |
          flutter build apk --release --flavor production -t lib/main.dart
      
      - name: Build Android AAB
        script: |
          flutter build appbundle --release --flavor production -t lib/main.dart
      
      - name: Run integration tests
        script: |
          flutter test integration_test/app_test.dart --flavor production
    
    artifacts:
      - build/**/outputs/apk/**/*.apk
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/mapping.txt
      - flutter_drive.log
    
    publishing:
      email:
        recipients:
          - build@example.com
        notify:
          success: false
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  # iOS workflow
  ios-workflow:
    name: iOS Build & Test
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      <<: *env_versions
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.example.{{project_name}}"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
      
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          xcode-project build-ipa --workspace ios/$XCODE_WORKSPACE --scheme $XCODE_SCHEME
      
      - name: Run integration tests
        script: |
          flutter test integration_test/app_test.dart
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false

  # Web workflow
  web-workflow:
    name: Web Build & Deploy
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      <<: *env_versions
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
      
      - name: Build web app
        script: |
          flutter build web --release --web-renderer canvaskit
      
      - name: Deploy to staging
        script: |
          # Add your deployment script here
          echo "Deploying to staging environment"
    
    artifacts:
      - build/web/**
    
    publishing:
      email:
        recipients:
          - deploy@example.com
        notify:
          success: true
          failure: true

  # Desktop workflows
  windows-workflow:
    name: Windows Build
    instance_type: windows_x2
    max_build_duration: 45
    environment:
      flutter: "3.22.0"
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=%FLUTTER_TEST_TIMEOUT%
      
      - name: Build Windows app
        script: |
          flutter config --enable-windows-desktop
          flutter build windows --release
    
    artifacts:
      - build/windows/x64/runner/Release/**

  macos-workflow:
    name: macOS Build
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      <<: *env_versions
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
      
      - name: Build macOS app
        script: |
          flutter config --enable-macos-desktop
          flutter build macos --release
    
    artifacts:
      - build/macos/Build/Products/Release/*.app

  linux-workflow:
    name: Linux Build
    instance_type: linux_x2
    max_build_duration: 45
    environment:
      flutter: "3.22.0"
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Analyze code
        script: |
          flutter analyze --fatal-infos
      
      - name: Run unit tests
        script: |
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
      
      - name: Build Linux app
        script: |
          flutter config --enable-linux-desktop
          flutter build linux --release
    
    artifacts:
      - build/linux/x64/release/bundle/**

  # Release workflow - triggers on tags
  release:
    name: Release Build
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      <<: *env_versions
      groups:
        - ios_signing
        - android_signing
        - release_credentials
      vars:
        FLUTTER_TEST_TIMEOUT: 30m
    cache: *cache
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Generate localizations
        script: |
          flutter gen-l10n
      
      - name: Run full test suite
        script: |
          flutter analyze --fatal-infos
          flutter test --coverage --timeout=$FLUTTER_TEST_TIMEOUT
          flutter test integration_test/app_test.dart
      
      - name: Build all platforms
        script: |
          # Android
          flutter build apk --release
          flutter build appbundle --release
          
          # iOS
          flutter build ios --release --no-codesign
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner
          
          # Web
          flutter build web --release
          
          # Desktop
          flutter config --enable-windows-desktop --enable-macos-desktop --enable-linux-desktop
          flutter build windows --release
          flutter build macos --release
          flutter build linux --release
    
    artifacts:
      - build/**/outputs/apk/**/*.apk
      - build/**/outputs/bundle/**/*.aab
      - build/ios/ipa/*.ipa
      - build/web/**
      - build/windows/x64/runner/Release/**
      - build/macos/Build/Products/Release/*.app
      - build/linux/x64/release/bundle/**
    
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
      app_store_connect:
        auth: integration
        submit_to_app_store: true
      slack:
        channel: '#releases'
        notify:
          success: true
          failure: true