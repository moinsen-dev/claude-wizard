name: Update Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          
          echo "## [$CURRENT_TAG] - $(date +%Y-%m-%d)" > temp_changelog.md
          echo "" >> temp_changelog.md
          
          if [ -n "$PREV_TAG" ]; then
            # Get commits since previous tag
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> temp_changelog.md
          else
            # First release, get all commits
            git log --pretty=format:"- %s (%h)" >> temp_changelog.md
          fi
          
          echo "" >> temp_changelog.md
          echo "" >> temp_changelog.md

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            # Prepend to existing changelog
            cat temp_changelog.md CHANGELOG.md > new_changelog.md
            mv new_changelog.md CHANGELOG.md
          else
            # Create new changelog
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat temp_changelog.md >> CHANGELOG.md
          fi
          rm temp_changelog.md

      - name: Commit changelog
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog for ${GITHUB_REF#refs/tags/} [skip ci]"
          git push origin main || true